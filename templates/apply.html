{% extends 'base.html' %}

{% block title %}
Apply for License
{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">

                <div class="card-header text-center">
                    <h3>License Application</h3>
                </div>

                <div class="card-body">
                    <form action="/create_application" method="POST">
                        <div class="mb-3">
                            <label class="form-label">
                                Business ID
                            </label>
                            <input type="number" name="business_id" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Application Type
                            </label>
                            <select name="application_type" class="form-select" required>
                                <option value="">
                                    Select License Type
                                </option>
                                <option value="New License">
                                    New License
                                </option>
                                <option value="Renewal">
                                    Renewal
                                </option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">
                                Submit Application
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
