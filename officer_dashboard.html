{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">Officer Dashboard</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-center mb-3">
                <div class="card-body">
                    <h3>{{ users }}</h3>
                    <p>Total Users</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center mb-3">
                <div class="card-body">
                    <h3>{{ businesses }}</h3>
                    <p>Total Businesses</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center mb-3">
                <div class="card-body">
                    <h3>{{ applications }}</h3>
                    <p>Total Applications</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center mb-3">
                <div class="card-body">
                    <h3>{{ pending }}</h3>
                    <p>Pending</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center mb-3">
                <div class="card-body">
                    <h3>{{ approved }}</h3>
                    <p>Approved</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center mb-3">
                <div class="card-body">
                    <h3>{{ rejected }}</h3>
                    <p>Rejected</p>
                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
